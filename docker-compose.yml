version: "3.9"

services:
  backend:
    build: ./backend
    container_name: chess-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - stockfish

  frontend:
    build: ./frontend
    container_name: chess-frontend
    restart: always
    ports:
      - "80:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  stockfish:
    build: ./stockfish
    container_name: stockfish-service
    restart: always
    ports:
      - "8001:8001"